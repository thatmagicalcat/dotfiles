# Background / foreground
background #000000
foreground #ffffff

# Cursor
cursor #ffffff
cursor_text_color #000000

# Selection
selection_background #444444
selection_foreground #ffffff

# Basic 16 colors (ANSI)
color0  #000000  # black
color1  #ff5555  # red
color2  #50fa7b  # green
color3  #f1fa8c  # yellow
color4  #bd93f9  # blue
color5  #ff79c6  # magenta
color6  #8be9fd  # cyan
color7  #bbbbbb  # white (light gray)

color8  #44475a  # bright black
color9  #ff5555  # bright red
color10 #50fa7b  # bright green
color11 #f1fa8c  # bright yellow
color12 #bd93f9  # bright blue
color13 #ff79c6  # bright magenta
color14 #8be9fd  # bright cyan
color15 #ffffff  # bright white

# URL color (optional but nice)
url_color #8be9fd

# Make bold text actually visible
bold_font auto

